<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TaskApp</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0d12;--surface:rgba(255,255,255,0.045);--surface2:rgba(255,255,255,0.07);--surface3:rgba(255,255,255,0.10);--card:#141419;--card2:#1a1a22;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--text:#f0f0f5;--text2:rgba(255,255,255,0.60);--text3:rgba(255,255,255,0.40);--text4:rgba(255,255,255,0.25);--purple:#8C59F2;--purple-dim:rgba(140,89,242,0.15);--cyan:#33D9E6;--cyan-dim:rgba(51,217,230,0.12);--pink:#F2408C;--pink-dim:rgba(242,64,140,0.12);--amber:#F2A624;--amber-dim:rgba(242,166,36,0.12);--green:#34d399;--green-dim:rgba(52,211,153,0.12);--red:#ef4444;--red-dim:rgba(239,68,68,0.12);--blue:#5B7FFF;--blue-dim:rgba(91,127,255,0.12);--high:#ef4444;--medium:#F2A624;--low:#33D9E6}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
::selection{background:var(--purple);color:#fff}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
input,textarea,select,button{font-family:inherit;color:var(--text)}

/* ── Titlebar ── */
.titlebar{height:38px;display:flex;align-items:center;background:rgba(0,0,0,0.4);border-bottom:1px solid var(--border);-webkit-app-region:drag;flex-shrink:0;z-index:100;position:relative}
.titlebar *{-webkit-app-region:no-drag}
.tb-g{display:flex;align-items:center;gap:2px;padding:0 8px}
.tbtn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border:none;background:none;color:var(--text3);border-radius:6px;cursor:pointer;transition:all .12s}
.tbtn:hover{background:var(--surface2);color:var(--text)}.tbtn.on{background:var(--surface3);color:var(--text)}.tbtn:disabled{opacity:.3;cursor:default}.tbtn:disabled:hover{background:none;color:var(--text3)}
.tb-space{flex:1;-webkit-app-region:drag}
.tb-r{display:flex;align-items:center;gap:6px;padding-right:4px}
.spinning svg{animation:spin .7s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
.avatar{width:26px;height:26px;border-radius:50%;border:2px solid var(--border2);background:var(--card);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text3);cursor:pointer;overflow:hidden;flex-shrink:0}
.avatar:hover{border-color:var(--purple)}.avatar img{width:100%;height:100%;object-fit:cover}
.wbtns{display:flex}.wbtn{width:46px;height:38px;display:flex;align-items:center;justify-content:center;border:none;background:none;color:var(--text3);cursor:pointer}.wbtn:hover{background:rgba(255,255,255,0.07);color:var(--text)}.wbtn.x:hover{background:#e04040;color:#fff}

/* ── App shell ── */
.app{display:flex;flex:1;overflow:hidden;position:relative}
.app::before{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(140,89,242,0.12),transparent 70%);top:-180px;left:-80px;pointer-events:none}
.app::after{content:'';position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(51,217,230,0.06),transparent 70%);bottom:-100px;right:-50px;pointer-events:none}

/* ── Sidebar ── */
.sidebar{width:88px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding-top:10px;border-right:1px solid var(--border);background:rgba(255,255,255,0.02);backdrop-filter:blur(20px);z-index:1;overflow-y:auto;overflow-x:hidden;transition:width .2s}
.sidebar.hide{width:0;overflow:hidden;border:none;padding:0}
.sbi{display:flex;flex-direction:column;align-items:center;gap:5px;padding:8px 4px;border-radius:12px;cursor:pointer;width:76px;position:relative;transition:all .15s;margin-bottom:2px}
.sbi:hover{background:rgba(255,255,255,0.04)}.sbi.act{background:rgba(255,255,255,0.06)}
.sbi-box{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;transition:transform .2s}
.sbi:hover .sbi-box{transform:scale(1.06)}.sbi.act .sbi-box{box-shadow:0 4px 16px rgba(0,0,0,0.3)}
.sbi-lbl{font-size:10px;font-weight:600}
.sbi-badge{position:absolute;top:0;right:6px;background:var(--red);color:#fff;font-size:10px;font-weight:800;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px}

/* ── Content ── */
.content{flex:1;display:flex;flex-direction:column;background:rgba(0,0,0,0.35);z-index:1;min-width:0;overflow:hidden}
.ch{padding:20px 28px 14px;flex-shrink:0}.ch-top{display:flex;align-items:center;gap:14px}
.ch-title{font-size:26px;font-weight:800;letter-spacing:-.5px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ch-acts{display:flex;gap:8px;flex-shrink:0}
.btn-p{display:flex;align-items:center;gap:5px;padding:6px 14px;border:none;border-radius:8px;background:rgba(140,89,242,0.85);color:#fff;font-size:15px;font-weight:600;cursor:pointer}.btn-p:hover{background:var(--purple)}.btn-p:active{transform:scale(.96)}
.btn-g{display:flex;align-items:center;gap:5px;padding:6px 12px;border:none;border-radius:8px;background:var(--surface2);color:var(--text2);font-size:14px;font-weight:600;cursor:pointer}.btn-g:hover{background:var(--surface3);color:var(--text)}

/* ── Inline add ── */
.ila{display:none;align-items:flex-start;gap:12px;padding:12px 28px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.ila.show{display:flex}
.ila-circ{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--text4);flex-shrink:0;margin-top:3px}
.ila-f{flex:1;display:flex;flex-direction:column;gap:4px}
.ila-f input{background:none;border:none;outline:none;font-size:17px;font-weight:500;width:100%}.ila-f input::placeholder{color:var(--text4)}
.ila-x{background:none;border:none;color:var(--text4);cursor:pointer;font-size:14px;padding:4px}
.nlps{display:flex;align-items:center;gap:8px;padding:4px 0;flex-wrap:wrap}
.nlps .w{font-size:11px;color:var(--purple)}
.nlpc{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:3px 7px;border-radius:5px;border:1px solid}
.nlpc.d{color:var(--pink);background:rgba(242,64,140,0.15);border-color:rgba(242,64,140,0.3)}
.nlpc.pr{color:var(--purple);background:var(--purple-dim);border-color:rgba(140,89,242,0.3)}
.nlpc.fl{color:var(--amber);background:var(--amber-dim);border-color:rgba(242,166,36,0.3)}
.nlpa{font-size:11px;font-weight:700;color:var(--purple);background:none;border:none;cursor:pointer;margin-left:auto}
.cdiv{height:1px;background:var(--border);flex-shrink:0}
.cscroll{flex:1;overflow-y:auto;overflow-x:hidden}
.shdr{display:flex;align-items:center;gap:8px;padding:16px 24px 6px}
.shdr .l{font-size:11px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;flex-shrink:0}
.shdr .ln{flex:1;height:1px;background:var(--border)}
.shdr .c{font-size:11px;color:var(--text4)}

/* ── Task rows ── */
.tr{display:flex;align-items:center;gap:14px;padding:12px 28px;cursor:pointer;transition:background .1s;position:relative}
.tr:hover{background:rgba(255,255,255,0.03)}
.tr.sel{background:rgba(140,89,242,0.10)}
.tr.sel::after{content:'';position:absolute;left:0;top:0;bottom:0;width:2.5px;background:var(--cyan)}
.tr.od:not(.sel){background:rgba(239,68,68,0.04)}
.tr.od:not(.sel)::after{content:'';position:absolute;left:0;top:0;bottom:0;width:2.5px;background:var(--red)}
.tr.tday::after{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--amber);opacity:.6}
.tr.evening::after{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--purple);opacity:.6}
.tr+.tr{border-top:1px solid var(--border)}
.ck{width:22px;height:22px;border-radius:50%;border:2px solid var(--border2);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;flex-shrink:0}.ck:hover{transform:scale(1.1)}
.ck.ph{border-color:var(--high)}.ck.pm{border-color:var(--medium)}.ck.pl{border-color:var(--low)}.ck.done{border-color:var(--text4)}
.pdot{width:8px;height:8px;border-radius:50%;opacity:.4}
.tb{flex:1;min-width:0}.tt{font-size:16px;font-weight:500;line-height:1.35;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tt.done{text-decoration:line-through;color:var(--text4)}.tt.od{font-weight:700;color:var(--red)}
.tt-edit{background:none;border:none;outline:none;font-size:16px;font-weight:500;width:100%;padding:0}
.tm{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.mc{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:1px 6px;border-radius:4px}
.mc-pj{background:var(--purple-dim);color:var(--purple)}.mc-od{background:var(--red-dim);color:var(--red)}.mc-td{background:var(--cyan-dim);color:var(--cyan)}.mc-du{color:var(--text2)}.mc-nt{color:var(--text4)}.mc-sb{color:var(--text4)}
.mc-pr{font-size:10px;font-weight:700;letter-spacing:.3px}
.cp-h{background:var(--red-dim);color:var(--high)}.cp-m{background:var(--amber-dim);color:var(--medium)}.cp-l{background:var(--cyan-dim);color:var(--low)}
.mc-tag{font-size:10px;font-weight:600;padding:1px 6px;border-radius:4px}
.mc-est{background:var(--surface2);color:var(--text3);font-size:10px;font-weight:600;padding:1px 6px;border-radius:4px}
.mc-rep{color:var(--text4);font-size:11px}
.ti{display:flex;align-items:center;gap:6px;flex-shrink:0}

/* ── Subtasks ── */
.stl{padding:4px 0 4px 68px}
.str{display:flex;align-items:center;gap:10px;padding:5px 0}
.stck{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--text3);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}.stck:hover{transform:scale(1.1)}.stck.dn{border-color:var(--text4)}
.stt{font-size:14px;color:var(--text2)}.stt.dn{text-decoration:line-through;color:var(--text4)}
.sta{display:flex;align-items:center;gap:10px;padding:5px 0}
.sta input{background:none;border:none;outline:none;font-size:14px;flex:1}.sta input::placeholder{color:var(--text4)}

/* ── Today drop zone ── */
.tdrop{margin:6px 20px 16px;padding:18px;border:1.5px dashed var(--border2);border-radius:10px;text-align:center;color:var(--text4);font-size:13px;transition:all .2s}
.tdrop.over{border-color:var(--amber);background:rgba(242,166,36,0.06);color:var(--amber)}
.twrap{margin:0 12px 8px;background:rgba(242,166,36,0.03);border:1px solid rgba(242,166,36,0.12);border-radius:10px;overflow:hidden}
.twrap.over{border-color:rgba(242,166,36,0.5);background:rgba(242,166,36,0.06)}

/* ── Empty states ── */
.emp{display:flex;flex-direction:column;align-items:center;padding-top:100px;gap:14px}
.emp-i{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px}
.emp-t{font-size:20px;font-weight:700}.emp-m{font-size:15px;color:var(--text2);text-align:center;max-width:280px}

/* ── Project rows ── */
.prow{display:flex;align-items:center;gap:14px;padding:14px 24px;cursor:pointer;transition:background .1s}
.prow:hover{background:rgba(255,255,255,0.04)}.prow+.prow{border-top:1px solid var(--border)}
.prow-n{font-size:15px;font-weight:600}.prow-c{font-size:12px;color:var(--text4);margin-top:2px}

/* ── Forecast ── */
.fl{display:flex;flex:1;overflow:hidden}
.fside{width:220px;flex-shrink:0;background:rgba(0,0,0,0.25);border-right:1px solid var(--border);overflow-y:auto}
.fmain{flex:1;display:flex;flex-direction:column;overflow:hidden}
.frail{display:flex;padding:8px 12px;background:rgba(0,0,0,0.2);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0}
.rc{width:54px;height:76px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border-radius:10px;cursor:pointer;flex-shrink:0;transition:all .15s}
.rc:hover{background:rgba(255,255,255,0.04)}.rc.s{background:var(--purple-dim)}.rc.s.t{background:var(--cyan-dim)}
.rc-l{font-size:9px;font-weight:800;letter-spacing:.5px;color:var(--text4)}.rc-n{font-size:19px;font-weight:500;color:var(--text)}
.rc.s .rc-l{color:var(--purple)}.rc.s .rc-n{font-weight:800;color:#fff}
.rc.t .rc-l{color:var(--cyan)}.rc.t .rc-n{color:var(--cyan);font-weight:800}
.rc.s.t .rc-n{color:#fff}
.rc-d{width:4px;height:4px;border-radius:50%}
.fscroll{flex:1;overflow-y:auto}
.fdh{padding:20px 24px 14px}.fdh .w{font-size:11px;font-weight:800;letter-spacing:.8px;color:var(--text4);text-transform:uppercase}.fdh .d{font-size:22px;font-weight:800;margin-top:2px}
.fsi{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;transition:background .1s;border-bottom:1px solid var(--border)}.fsi:hover{background:rgba(255,255,255,0.03)}.fsi.s{background:rgba(140,89,242,0.08)}
.fsi .l{font-size:15px;font-weight:600}.fsi .n{font-size:13px;font-weight:700;color:#fff;padding:2px 8px;border-radius:6px}
.mcal{padding:12px}.mcal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}.mcal-nav span{font-size:13px;font-weight:700}.mcal-nav button{background:none;border:none;color:var(--text2);cursor:pointer;font-size:14px;padding:4px}
.mcg{display:grid;grid-template-columns:repeat(7,1fr);text-align:center}.mcg-h{font-size:10px;font-weight:700;color:var(--text4);padding:4px 0}
.mcg-d{font-size:12px;cursor:pointer;position:relative;display:flex;align-items:center;justify-content:center;width:26px;height:26px;margin:1px auto;border-radius:50%;transition:all .1s}.mcg-d:hover{background:var(--surface2)}.mcg-d.t{color:var(--cyan);font-weight:700}.mcg-d.s{background:var(--cyan);color:#000;font-weight:700}
.mcg-dot{position:absolute;bottom:1px;width:3px;height:3px;border-radius:50%;background:var(--purple)}
.fgh{display:flex;align-items:center;gap:8px;padding:10px 24px;cursor:pointer;background:rgba(13,13,18,0.85);position:sticky;top:0;z-index:2}.fgh:hover{background:rgba(255,255,255,0.03)}
.fgh-ch{font-size:11px;color:var(--text4);transition:transform .2s}.fgh-ch.c{transform:rotate(-90deg)}
.fgh-t{font-size:14px;font-weight:700}.fgh-n{font-size:12px;font-weight:700;color:var(--text4);padding:1px 6px;background:var(--surface);border-radius:4px}

/* ── Review ── */
.rcard{margin:16px 24px;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.rch{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border)}.rch h3{font-size:20px;font-weight:700}.rch .sub{font-size:14px;color:var(--text4);margin-top:2px}
.btn-rv{padding:8px 16px;border:none;border-radius:8px;background:var(--purple);color:#fff;font-size:15px;font-weight:700;cursor:pointer}.btn-rv:hover{opacity:.85}

/* ── Inspector panel ── */
.insp{width:330px;flex-shrink:0;border-left:1px solid var(--border);background:rgba(255,255,255,0.025);backdrop-filter:blur(20px);display:flex;flex-direction:column;z-index:1;transition:width .25s cubic-bezier(.32,.72,0,1),opacity .2s}
.insp.hide{width:0;opacity:0;overflow:hidden;border:none}
.insp-close{display:flex;justify-content:flex-end;padding:10px 12px 0;flex-shrink:0}
.insp-x{width:24px;height:24px;border-radius:50%;background:var(--surface2);border:none;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;transition:all .12s}
.insp-x:hover{background:var(--surface3);color:var(--text)}
.insp-s{flex:1;overflow-y:auto;padding:0 18px 24px}

/* Inspector title area */
.insp-title-row{display:flex;align-items:flex-start;gap:10px;padding:16px 18px 14px}
.insp-ck{width:22px;height:22px;border-radius:50%;border:2px solid var(--border2);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;transition:all .15s}
.insp-ck:hover{transform:scale(1.1)}.insp-ck.ph{border-color:var(--high)}.insp-ck.pm{border-color:var(--medium)}.insp-ck.pl{border-color:var(--low)}.insp-ck.done{background:var(--purple);border-color:var(--purple)}
.insp-ti{flex:1;background:none;border:none;outline:none;font-size:17px;font-weight:600;line-height:1.35;resize:none;overflow:hidden;min-height:26px}
.insp-ti.done{text-decoration:line-through;color:var(--text4)}

/* Inspector sections */
.isec{margin-bottom:14px}
.isec-divider{height:1px;background:var(--border);margin:14px 0}
.ilbl{font-size:10px;font-weight:800;color:var(--text4);letter-spacing:.6px;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.ifld input,.ifld textarea,.ifld select{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:14px;padding:9px 12px;outline:none;transition:border-color .12s}
.ifld input:focus,.ifld textarea:focus{border-color:var(--purple);box-shadow:0 0 0 3px var(--purple-dim)}
.ifld textarea{resize:none;min-height:72px;line-height:1.5;color:var(--text2)}
.ifld textarea::placeholder{color:var(--text4)}
.ifld select{-webkit-appearance:none;cursor:pointer;color:var(--text2)}

/* Inspector meta cards */
.icard{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px}
.irow{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;gap:8px}
.irow+.irow{border-top:1px solid var(--border)}
.irow .l{font-size:14px;color:var(--text2);flex-shrink:0;white-space:nowrap}
.irow .rv{flex:1;text-align:right}
.irow select{background:transparent;border:none;outline:none;font-size:13px;color:var(--text2);cursor:pointer;text-align:right;-webkit-appearance:none;max-width:140px}
.irow input[type="datetime-local"],.irow input[type="date"]{background:transparent;border:none;outline:none;font-size:13px;color:var(--text2);text-align:right}
.irow-date-full{padding:10px 14px;border-top:1px solid var(--border)}
.irow-date-full input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:13px;outline:none}
.irow-date-full input:focus{border-color:var(--purple)}
.irow .clr{background:none;border:none;color:var(--text4);cursor:pointer;font-size:16px;line-height:1;padding:0 2px;flex-shrink:0}
.irow .clr:hover{color:var(--red)}
.tog{width:38px;height:22px;border-radius:11px;background:var(--surface3);border:none;cursor:pointer;position:relative;transition:background .25s;flex-shrink:0}
.tog.on{background:var(--green)}.tog.am.on{background:var(--amber)}.tog.cy.on{background:var(--cyan)}.tog.pu.on{background:var(--purple)}
.tog::after{content:'';position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:2px;left:2px;transition:transform .2s cubic-bezier(.32,.72,0,1);box-shadow:0 1px 3px rgba(0,0,0,.3)}
.tog.on::after{transform:translateX(16px)}

/* Inspector tags */
.itags{display:flex;flex-wrap:wrap;gap:6px;padding:4px 0}
.itag-pill{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid;transition:all .12s}

/* Inspector subtasks */
.isub-list{display:flex;flex-direction:column;gap:2px}
.isub-row{display:flex;align-items:center;gap:8px;padding:5px 0}
.isub-ck{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--text3);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}.isub-ck:hover{transform:scale(1.1)}.isub-ck.dn{background:var(--purple);border-color:var(--purple)}
.isub-t{font-size:14px;color:var(--text2);flex:1}.isub-t.dn{text-decoration:line-through;color:var(--text4)}
.isub-add{display:flex;align-items:center;gap:8px;padding:6px 0;margin-top:4px}

/* ══════════ NLP ══════════ */
function parseNLP(s){let w=s.split(/\s+/).filter(Boolean),pr='None',fl=false,rm=new Set();w.forEach((x,i)=>{switch(x.toLowerCase()){case'!high':pr='High';rm.add(i);break;case'!medium':pr='Medium';rm.add(i);break;case'!low':pr='Low';rm.add(i);break;case'!flag':case'!flagged':fl=true;rm.add(i);break}});w=w.filter((_,i)=>!rm.has(i));rm=new Set();let due=null,tH=null,tM=0;const td=D(new Date());for(let i=0;i<w.length;i++){const x=w[i].toLowerCase();if(x==='at'&&i+1<w.length){const p=pTime(w[i+1]);if(p){tH=p[0];tM=p[1];rm.add(i);rm.add(i+1);i++;continue}}const p=pTime(x);if(p){tH=p[0];tM=p[1];rm.add(i);continue}const o=nDay(x);if(o!==null){if(!due){due=new Date(td);due.setDate(due.getDate()+o)}rm.add(i);continue}if(x==='next'&&i+1<w.length&&w[i+1].toLowerCase()==='week'){due=new Date(td);due.setDate(due.getDate()+7);rm.add(i);rm.add(i+1);i++;continue}const mn=mNum(x);if(mn!==null&&i+1<w.length){const dy=parseInt(w[i+1]);if(dy){due=new Date(td.getFullYear(),mn-1,dy);if(due<td)due.setFullYear(due.getFullYear()+1);rm.add(i);rm.add(i+1);i++;continue}}}if(tH!==null){if(!due)due=new Date(td);due.setHours(tH,tM,0,0)}const rest=w.filter((_,i)=>!rm.has(i)).join(' ').trim();const iso=due?due.toISOString():null;if(!iso&&pr==='None'&&!fl)return null;return{title:rest||s,dueDate:iso,priority:pr,isFlagged:fl}}
function pTime(s){const l=s.toLowerCase(),pm=l.endsWith('pm'),am=l.endsWith('am'),st=(pm||am)?l.slice(0,-2):l;if(!st)return null;const p=st.split(':');let h=parseInt(p[0]);if(isNaN(h))return null;const m=p.length>1?parseInt(p[1])||0:0;if(pm&&h<12)h+=12;if(am&&h===12)h=0;return(h>=0&&h<=23&&m>=0&&m<=59)?[h,m]:null}
function nDay(w){const d={today:0,tomorrow:1};if(w in d)return d[w];const m={sunday:0,monday:1,tuesday:2,wednesday:3,thursday:4,friday:5,saturday:6};if(w in m){const c=new Date().getDay(),df=(m[w]-c+7)%7;return df===0?7:df}return null}
function mNum(s){const m={jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};return m[s.toLowerCase().substring(0,3)]||null}
function fNLP(d){const x=new Date(d);if(isT(d))return'Today '+x.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});if(isTm(d))return'Tomorrow '+x.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});return x.toLocaleDateString([],{month:'short',day:'numeric'})}

function rToday(){

/* ── Logbook (grouped by completion date) ── */
function rLog(){
  const d=done();
  if(!d.length)return empH('✓','Nothing completed yet','Tasks you finish appear here.','var(--green)');
  const grp={};
  d.slice(0,200).forEach(t=>{
    const c=t.completed_at;
    let k='Earlier';
    if(c){
      const cd=new Date(c);
      if(isT(cd))k='Today';
      else if(new Date()-cd<86400000*2)k='Yesterday';
      else k=new Date(c).toLocaleDateString('en-US',{month:'short',day:'numeric'});
    }
    (grp[k]=grp[k]||[]).push(t);
  });
  const order=['Today','Yesterday'];
  const keys=Object.keys(grp).sort((a,b)=>{const ia=order.indexOf(a)>=0?order.indexOf(a):99,ib=order.indexOf(b)>=0?order.indexOf(b):99;return ia-ib});
  let h='';
  keys.forEach(k=>{h+='<div class="shdr"><span class="l" style="color:var(--text4)">'+E(k.toUpperCase())+'</span><span class="ln"></span><span class="c">'+grp[k].length+'</span></div>';grp[k].forEach(t=>h+=tRow(t,1,0))});
  return h
}

/* ══════════ FORECAST ══════════ */
function rForecast(){
  const days=[];for(let i=0;i<14;i++){const d=new Date();d.setDate(d.getDate()+i);days.push(D(d))}
  if(!fd)fd=days[0];
  const fv=fd.getTime(),on=odTasks().length,fn=fuTasks().length;
  let h='<div class="fl"><div class="fside"><div class="fsi'+(fv===0?' s':'')+'\" onclick=\"fd=new Date(0);render()\"><span class="l" style="color:'+(on?'var(--red)':'var(--text4)')+'">Past</span>'+(on?'<span class="n" style="background:var(--red)">'+on+'</span>':'')+'</div>'+rMCal()+'<div class="fsi'+(fv>=8640000000000000?' s':'')+'\" onclick=\"fd=new Date(8640000000000000);render()\"><span class="l">Future</span>'+(fn?'<span class="n" style="background:var(--purple)">'+fn+'</span>':'')+'</div></div><div class="fmain"><div class="frail">';
  h+='<div class="rc'+(fv===0?' s':'')+'\" onclick=\"fd=new Date(0);render()\"><span class="rc-l">PAST</span><span class="rc-n" style="font-size:15px">'+on+'</span><div class="rc-d" style="background:'+(on?'var(--red)':'transparent')+'"></div></div>';
  days.forEach((d,i)=>{const s=fv===d.getTime(),t=i===0,n=dTasks(d).length;h+='<div class="rc'+(s?' s':'')+(t?' t':'')+'\" onclick=\"fd=new Date('+d.getTime()+');render()\"><span class="rc-l">'+(t?'TODAY':d.toLocaleDateString('en-US',{weekday:'short'}).toUpperCase().slice(0,3))+'</span><span class="rc-n">'+d.getDate()+'</span><div class="rc-d" style="background:'+(n?'var(--purple)':'transparent')+'"></div></div>'});
  h+='<div class="rc'+(fv>=8640000000000000?' s':'')+'\" onclick=\"fd=new Date(8640000000000000);render()\"><span class="rc-l">LATER</span><span class="rc-n" style="font-size:15px">'+fn+'</span><div class="rc-d" style="background:'+(fn?'var(--purple)':'transparent')+'"></div></div></div><div class="fscroll">';
  if(fv===0)h+=rFG(odTasks(),'No overdue tasks');

  else{const dn=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];h+='<div class="fdh"><div class="w">'+dn[fd.getDay()].toUpperCase()+'</div><div class="d">'+fMD(fd)+'</div></div>';const dt=dTasks(fd);if(!dt.length)h+=empH('📅','Nothing scheduled','Enjoy the free time.','var(--cyan)');else dt.forEach(t=>h+=tRow(t,1,0))}

function rFG(list,msg){if(!list.length)return empH('✓',msg,'','');const gs=[];list.forEach(t=>{const d=t.due_date?new Date(t.due_date):new Date();const k=isT(d)?'Today':d.toLocaleDateString('en-US',{month:'long',day:'numeric'});const g=gs.find(x=>x.k===k);if(g)g.t.push(t);else gs.push({k,t:[t]})});let h='';gs.forEach(g=>{const c=cols.has(g.k);h+='<div class="fgh" onclick="togSec(\''+E(g.k)+'\')"><span class="fgh-ch'+(c?' c':'')+'">▼</span><span class="fgh-t">'+E(g.k)+'</span><span class="fgh-n">'+g.t.length+'</span></div>';if(!c)g.t.forEach(t=>h+=tRow(t,1,0))});return h}

function rMCal(){const b=new Date();b.setMonth(b.getMonth()+fmo);const y=b.getFullYear(),m=b.getMonth(),f=new Date(y,m,1),wd=f.getDay(),dm=new Date(y,m+1,0).getDate();const mn=['January','February','March','April','May','June','July','August','September','October','November','December'];let h='<div class="mcal"><div class="mcal-nav"><button onclick="fmo--;render()">◀</button><span>'+mn[m]+' '+y+'</span><button onclick="fmo++;render()">▶</button></div><div class="mcg">';['S','M','T','W','T','F','S'].forEach(d=>h+='<div class="mcg-h">'+d+'</div>');for(let i=0;i<wd;i++)h+='<div></div>';for(let d=1;d<=dm;d++){const dt=new Date(y,m,d);const it=D(dt).getTime()===D(new Date()).getTime();const is=fd&&fd.getTime()>0&&fd.getTime()<8640000000000000&&D(dt).getTime()===D(fd).getTime();const has=dTasks(dt).length>0;h+='<div class="mcg-d'+(it?' t':'')+(is?' s':'')+'\" onclick=\"fd=new Date('+dt.getTime()+');render()\">'+d+(has?'<div class="mcg-dot"></div>':'')+'</div>'}return h+'</div></div>'}

/* ══════════ KEYBOARD ══════════ */
document.addEventListener('keydown',e=>{
  // Escape closes inspector, overlays, or clears selection
  if(e.key==='Escape'){
    if(document.getElementById('cpal').classList.contains('open')){closeCPal();return}
    if(document.getElementById('sov').classList.contains('open')){closeSrch();return}
    if(selSet.size>0){clearSel();return}
    if(stid){stid=null;im='task';render();return}
    hideILA();return;
  }
  if(e.ctrlKey||e.metaKey){
    if(e.key==='f'){e.preventDefault();openSrch()}
    else if(e.key==='k'){e.preventDefault();openCPal()}
    else if(e.key==='n'){e.preventDefault();showILA()}
    else if(e.key==='z'){e.preventDefault();doUndo()}
    else if(e.key==='r'){e.preventDefault();doSync()}
    else if(e.key==='\\'){e.preventDefault();togSB()}
    // Perspective shortcuts Ctrl+1 through Ctrl+9
    else if(e.key>='1'&&e.key<='9'){e.preventDefault();const idx=parseInt(e.key)-1;if(idx<PS.length)swP(PS[idx].id)}
    // UI zoom
    else if(e.key==='='||e.key==='+'){e.preventDefault();uiScale=Math.min(1.5,Math.round((uiScale+0.1)*10)/10);applyScale()}
    else if(e.key==='-'){e.preventDefault();uiScale=Math.max(0.7,Math.round((uiScale-0.1)*10)/10);applyScale()}
    else if(e.key==='0'){e.preventDefault();uiScale=1;applyScale()}
    return;
  }
  // Arrow key nav & Space (only when no text input is focused)
  const foc=document.activeElement;
  const inp=foc&&(foc.tagName==='INPUT'||foc.tagName==='TEXTAREA'||foc.tagName==='SELECT');
  if(!inp){
    if(e.key==='ArrowDown'||e.key==='ArrowUp'){
      e.preventDefault();
      const vis=visTasks();if(!vis.length)return;
      const ci=stid?vis.findIndex(t=>t.id===stid):-1;
      const nx=e.key==='ArrowDown'?Math.min(ci+1,vis.length-1):Math.max(ci-1,0);
      stid=vis[nx].id;im='task';rInsp();rCt();
      const el=document.getElementById('t-'+stid);
      if(el)el.scrollIntoView({block:'nearest',behavior:'smooth'});
    }else if(e.key===' '&&stid){
      e.preventDefault();comp(stid);
    }
  }
});

// Returns the flat visible task array for the current perspective (top-level tasks only)
function visTasks(){
  if(cp==='inbox')return[...tInbox(),...eveningInbox(),...inbox()];
  if(cp==='today')return todayPerspTasks();
  if(cp==='anytime')return anytimeTasks();
  if(cp==='someday')return somedayTasks();
  if(cp==='flagged')return flagged();
  if(cp==='logbook')return done().slice(0,200);
  if(cp==='projects'&&spid)return pTasks(spid);
  if(cp.startsWith('tags_')){const tid=cp.replace('tags_','');return T.filter(t=>!t.is_completed&&!t.parent_id&&getTagIds(t).includes(tid))}
  return[...tInbox(),...eveningInbox(),...inbox()];
}

// Ctrl/Shift click handler for multi-select
function mSel(id,ev){
  ev.stopPropagation();
  const vis=visTasks();
  if(ev.shiftKey&&lastSelId){
    const a=vis.findIndex(t=>t.id===lastSelId),b=vis.findIndex(t=>t.id===id);
    if(a>=0&&b>=0){const[lo,hi]=[Math.min(a,b),Math.max(a,b)];vis.slice(lo,hi+1).forEach(t=>selSet.add(t.id))}
  }else{
    if(selSet.has(id))selSet.delete(id);else selSet.add(id);
    lastSelId=id;
  }
  updBatchBar();rCt();rInsp();
}

function clearSel(){selSet.clear();lastSelId=null;updBatchBar();rCt()}

function updBatchBar(){
  const bb=document.getElementById('batchBar');if(!bb)return;
  const n=selSet.size;
  if(n>0){bb.classList.add('show');document.getElementById('batchCount').textContent=n+' selected'}
  else bb.classList.remove('show');
}

async function batchComp(){const ids=[...selSet];clearSel();for(const id of ids)await comp(id)}
async function batchDel(){
  if(!selSet.size)return;
  const ids=[...selSet];
  pushUndo({type:'batch_delete',tasks:ids.map(id=>{const t=T.find(x=>x.id===id);return t?{...t}:null}).filter(Boolean)});
  clearSel();ids.forEach(id=>delT(id));
}
async function batchToday(){const ids=[...selSet];clearSel();for(const id of ids)await mkTd(id,true)}

// Undo stack
function pushUndo(action){undoStack.push(action);if(undoStack.length>50)undoStack.shift()}
async function doUndo(){
  const action=undoStack.pop();
  if(!action){toast('Nothing to undo');return}
  if(action.type==='complete'){
    const t={...action.task,is_completed:false,completed_at:null,updated_at:new Date().toISOString()};
    T=T.filter(x=>x.id!==t.id);T.unshift(t);
    render();try{await ups(t)}catch{}toast('Undone ✓');
  }else if(action.type==='delete'){
    const t={...action.task,updated_at:new Date().toISOString()};
    T.unshift(t);render();try{await ups(t)}catch{}toast('Restored ✓');
  }else if(action.type==='batch_delete'){
    for(const t of action.tasks){const rt={...t,updated_at:new Date().toISOString()};T.unshift(rt);try{await ups(rt)}catch{}}
    render();toast('Restored '+action.tasks.length+' task'+(action.tasks.length!==1?'s':''));
  }
}

// Duplicate task
async function dupT(id){
  const src=T.find(t=>t.id===id);if(!src)return;
  const now=new Date().toISOString();
  const t={...src,id:uid(),title:src.title+' (copy)',created_at:now,updated_at:now,completed_at:null,is_completed:false,sort_order:T.length};
  T.push(t);render();try{await ups(t);toast('Duplicated')}catch{toast('Sync failed')}
}

// Move task to project
async function moveToProj(id,pid){
  await svF(id,'project_id',pid||null);
  toast(pid?'Moved to project':'Moved to Inbox');
}

/* ── Drag-to-reorder ── */
let dragOverId=null,dragPos='below';
function tDragOver(ev,id){
  ev.preventDefault();ev.stopPropagation();
  if(dragId===id)return;
  const el=document.getElementById('t-'+id);if(!el)return;
  const r=el.getBoundingClientRect();
  const newPos=ev.clientY<r.top+r.height/2?'above':'below';
  if(dragOverId!==id||dragPos!==newPos){
    document.querySelectorAll('.tr.drag-above,.tr.drag-below').forEach(e=>{e.classList.remove('drag-above','drag-below')});
    el.classList.add(newPos==='above'?'drag-above':'drag-below');
    dragOverId=id;dragPos=newPos;
  }
}
function tDragLeave(id){
  if(dragOverId!==id)return;
  const el=document.getElementById('t-'+id);
  if(el){el.classList.remove('drag-above','drag-below')}
  dragOverId=null;
}
async function tDrop(ev,id){
  ev.preventDefault();ev.stopPropagation();
  document.querySelectorAll('.tr.drag-above,.tr.drag-below').forEach(e=>{e.classList.remove('drag-above','drag-below')});
  if(!dragId||dragId===id){dragId=null;dragOverId=null;return}
  const vis=visTasks();
  let srcI=vis.findIndex(t=>t.id===dragId),dstI=vis.findIndex(t=>t.id===id);
  if(srcI<0||dstI<0){dragId=null;dragOverId=null;return}
  if(dragPos==='below')dstI++;
  const arr=[...vis];
  const[removed]=arr.splice(srcI,1);
  const adj=srcI<dstI?dstI-1:dstI;
  arr.splice(adj,0,removed);
  arr.forEach((t,i)=>{t.sort_order=i});
  dragId=null;dragOverId=null;
  render();
  await Promise.allSettled(arr.map(t=>ups(t)));
}
